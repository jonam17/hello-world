<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hello, World — First Transmission">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3FB950" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#3FB950" stop-opacity="1"/>
      <stop offset="0.85" stop-color="#3FB950" stop-opacity="1"/>
      <stop offset="1" stop-color="#3FB950" stop-opacity="0"/>
    </linearGradient>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }
      .pulse-line {
        stroke-dasharray: 1400;
        stroke-dashoffset: 1400;
        animation: draw 4s linear infinite;
      }
      @keyframes draw {
        0%   { stroke-dashoffset: 1400; }
        70%  { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: 0; }
      }
      .blink { animation: blink 1.2s steps(2, start) infinite; }
      @keyframes blink { to { visibility: hidden; } }
      .dot { animation: throb 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes throb { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
  </defs>

  <!-- background -->
  <rect width="900" height="220" rx="12" fill="#0D1117" stroke="#1F2937" stroke-width="2"/>

  <!-- faint grid -->
  <g stroke="#161B22" stroke-width="1">
    <line x1="0" y1="55"  x2="900" y2="55"/>
    <line x1="0" y1="110" x2="900" y2="110"/>
    <line x1="0" y1="165" x2="900" y2="165"/>
    <line x1="150" y1="0" x2="150" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="450" y1="0" x2="450" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="750" y1="0" x2="750" y2="220"/>
  </g>

  <!-- top status line -->
  <circle class="dot" cx="34" cy="36" r="5" fill="#3FB950"/>
  <text x="50" y="41" class="mono" font-size="13" letter-spacing="2" fill="#3FB950">SIGNAL ACQUIRED // NODE 00 // FIRST_TRANSMISSION</text>
  <text x="866" y="41" text-anchor="end" class="mono" font-size="13" letter-spacing="2" fill="#58A6FF">EST. 2021</text>

  <!-- main title -->
  <text x="50" y="105" class="mono" font-size="46" font-weight="bold" letter-spacing="4" fill="#C9D1D9">HELLO, WORLD<tspan class="blink" fill="#58A6FF">_</tspan></text>

  <!-- EKG pulse line -->
  <polyline class="pulse-line"
    points="30,165 120,165 145,165 160,130 175,195 190,150 205,165 320,165 345,165 360,125 375,200 390,148 405,165 540,165 565,165 580,128 595,197 610,150 625,165 760,165 785,165 800,132 815,192 830,152 845,165 870,165"
    fill="none" stroke="url(#fade)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- bottom caption -->
  <text x="50" y="205" class="mono" font-size="12" letter-spacing="3" fill="#8B949E">EVERY SYSTEM BOOTS FROM A SINGLE LINE</text>
</svg>
